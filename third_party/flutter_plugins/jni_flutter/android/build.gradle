// The Android Gradle Plugin builds the native code with the Android NDK.

group 'com.github.dart_lang.jni_flutter'
version '1.0'

/*
 * Flutter 3.44 scans plugin Gradle files for KGP markers and otherwise applies
 * kotlin-android programmatically. Keep this marker until Flutter stops doing
 * that; the plugin itself uses AGP 9 Built-in Kotlin.
apply plugin: 'kotlin-android'
 */

buildscript {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.github.dart_lang.jni_flutter'
    }

    compileSdk 35

    defaultConfig {
        minSdk 21
        consumerProguardFiles 'consumer-rules.pro'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}
