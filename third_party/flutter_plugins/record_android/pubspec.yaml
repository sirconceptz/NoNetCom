name: record_android
description: Android specific implementation for record package called by record_platform_interface.
version: 2.0.1
homepage: https://github.com/llfbandit/record/tree/main/record_android

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  record_platform_interface: ^2.0.0

flutter:
  plugin:
    implements: record
    platforms:
      android:
        package: com.llfbandit.record
        pluginClass: RecordPlugin
